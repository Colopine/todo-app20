apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app20
  labels:
    app: todo-app20
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app20
  template:
    metadata:
      labels:
        app: todo-app20
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app20
        image: 121531024010.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app20:0b62daf
        ports:
        - containerPort: 5000